spring.application.name=gestione-carburante

# --- CONFIGURAZIONE MYSQL ---
# Sostituisci 'nome_del_tuo_database' con il nome reale del DB creato su MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/carbonoil?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Chrono2018!!
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# --- HIBERNATE / JPA ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
# 'update' è perfetto: aggiorna lo schema senza cancellare i dati esistenti
spring.jpa.hibernate.ddl-auto=update
# Importante per MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- SERVER ---
server.port=8085
server.shutdown=graceful